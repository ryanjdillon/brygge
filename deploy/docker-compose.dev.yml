# Brygge — Development Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ── API: dev target with hot-reload mount ─────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../backend:/app
    ports:
      - "8080:8080"
    labels:
      - traefik.enable=false
    environment:
      - VIPPS_MOCK_URL=http://vipps-mock:8090
      - VIPPS_CALLBACK_URL=http://localhost:8080/api/v1/auth/vipps/callback
      - FRONTEND_URL=http://localhost:5173

  # ── Postgres: expose for local tooling ─────────────────────────
  db:
    ports:
      - "5432:5432"

  # ── Redis: expose for local tooling ────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ── Vipps Mock: local API simulator ────────────────────────
  vipps-mock:
    build:
      context: ../dev/vipps-mock
      dockerfile: Dockerfile
    ports:
      - "8090:8090"
    environment:
      - WEBHOOK_TARGET=http://api:8080/api/v1/webhooks/vipps
    networks:
      - brygge

  # ── Disable services not needed in dev ─────────────────────────
  traefik:
    profiles:
      - disabled

  dendrite:
    profiles:
      - disabled

  element:
    profiles:
      - disabled

  uptime-kuma:
    profiles:
      - disabled
