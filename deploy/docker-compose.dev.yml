# Brygge — Development Overlay
# Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  # ── API: dev target with hot-reload mount ─────────────────────
  api:
    build:
      context: ..
      dockerfile: Dockerfile
      target: dev
    volumes:
      - ../backend:/app
    ports:
      - "8080:8080"
    labels:
      - traefik.enable=false

  # ── Postgres: expose for local tooling ─────────────────────────
  db:
    ports:
      - "5432:5432"

  # ── Redis: expose for local tooling ────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ── Disable services not needed in dev ─────────────────────────
  traefik:
    profiles:
      - disabled

  dendrite:
    profiles:
      - disabled

  element:
    profiles:
      - disabled

  uptime-kuma:
    profiles:
      - disabled
